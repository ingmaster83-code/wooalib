name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install dependencies
        run: bundle install

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}" --verbose 2>&1 | tail -20
        env:
          JEKYLL_ENV: production

      - name: Check generated pages
        run: |
          echo "=== Generated page count ==="
          find _site -name "*.html" | wc -l
          echo "=== Region directories ==="
          ls _site/region/ | head -5
          echo "=== Library count ==="
          ls _site/library/ | wc -l
          echo "=== search_index.json ==="
          ls -la _site/search_index.json 2>/dev/null || echo "NOT FOUND"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
